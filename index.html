<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sociograma Aula</title>
  <script>navigator.serviceWorker?.getRegistrations().then(r=>r.forEach(r=>r.unregister()))</script>
  <script>if(localStorage.getItem('sociograma-dark')==='true'||(!localStorage.getItem('sociograma-dark')&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')</script>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
  <link rel="icon" href="favicon.svg" type="image/svg+xml" sizes="any">
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">
  <link href="css/style.css" rel="stylesheet">
  <style>
    @media print {
      body { background: white !important; }
      header, .step-progress, .sidebar-buttons, .privacy-panel { display: none !important; }
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      .bg-white\/80, .bg-white\/70, .bg-white\/60 { background: white !important; }
      [class*="backdrop-blur"] { backdrop-filter: none !important; }
      .shadow-lg, .shadow-md, .shadow-sm, .shadow { box-shadow: none !important; }
      .rounded-2xl, .rounded-xl, .rounded-lg { border-radius: 4px !important; }
    }
    .print-only { display: none; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-indigo-50/30 dark:from-slate-900 dark:to-indigo-950/30 min-h-screen antialiased">
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
